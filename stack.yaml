version: 1.0
provider:
  name: openfaas
  gateway: http://127.0.0.1:8080
functions:
  ping:
    lang: dockerfile
    handler: ./ping
    image: ${REGISTRY:-ttl.sh}/${OWNER:-welteki}/ping:${TAG:-0.0.2}

  ndjson:
    lang: golang-middleware
    handler: ./ndjson
    image: ${REGISTRY:-ttl.sh}/${OWNER:-welteki}/ndjson:${TAG:-0.0.1}
    environment:
      exec_timeout: 10m
      write_timeout: 10m
      read_timeout: 10m

  callback-counter:
    lang: golang-middleware
    handler: ./callback-counter
    image: ${REGISTRY:-ttl.sh}/${OWNER:-welteki}/callback-counter:${TAG:-0.0.1}
    labels:
      com.openfaas.scale.min: "1"
      com.openfaas.scale.max: "1"

  async-load:
    lang: golang-middleware
    handler: ./async-load
    image: ${REGISTRY:-ttl.sh}/${OWNER:-welteki}/async-load:${TAG:-0.0.10}
    labels:
      com.openfaas.scale.min: "1"
      com.openfaas.scale.max: "1"
    environment:
      OPENFAAS_URL: http://gateway.openfaas:8080
      # OPENFAAS_URL: https://slicer-gw.exit.welteki.dev

  transient-chaos:
    lang: golang-middleware
    handler: ./transient-chaos
    image: ${REGISTRY:-ttl.sh}/${OWNER:-welteki}/transient-chaos:${TAG:-0.0.1}
    labels:
      com.openfaas.scale.min: "1"
      com.openfaas.scale.max: "1"

  variable-inflight:
    lang: golang-middleware
    handler: ./variable-inflight
    image: ${REGISTRY:-ttl.sh}/${OWNER:-welteki}/variable-inflight:${TAG:-0.0.5}
    annotations:
      com.openfaas.ready.http.path: "/_/ready"
    labels:
      com.openfaas.scale.min: "1"
      com.openfaas.scale.max: "1"
    environment:
      exec_timeout: 1h
      write_timeout: 1h1m
      read_timeout: 1h1m
      status_code: "429"

  overload-simulator:
    lang: golang-middleware
    handler: ./overload-simulator
    image: ${REGISTRY:-ttl.sh}/${OWNER:-welteki}/overload-simulator:${TAG:-0.0.4}
    annotations:
      com.openfaas.ready.http.path: "/ready"
    labels:
      com.openfaas.scale.min: "1"
      com.openfaas.scale.max: "1"
    environment:
      inflight_threshold: "5"
      failure_mode: "constant"
      status_code: "500"
      sleep_duration: "100ms"
      use_ready_endpoint: "true"
